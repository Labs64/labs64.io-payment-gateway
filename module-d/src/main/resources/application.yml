server:
  port: 8080
app:
  default-broker: rabbit # rabbit or kafka
spring:
  application:
    name: module-d-core
  cloud:
    stream:
      bindings:
        receive-in-0:
          destination: labs64-topic
          group: subscriber-group
          binder: ${app.default-broker:rabbit}
      binders:
        rabbit:
          type: rabbit
          environment:
            spring:
              rabbitmq:
                host: rabbitmq.default.svc.cluster.local
                port: 5672
                username: labs64
                password: labs64pw
        kafka:
          type: kafka
          environment:
            spring:
              cloud:
                stream:
                  kafka:
                    binder:
                      brokers: kafka.default.svc.cluster.local:9092
                      configuration:
                        security.protocol: SASL_PLAINTEXT
                        sasl.mechanism: SCRAM-SHA-256
                        sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="labs64" password="labs64pw";
      kafka:
        bindings:
          kafka-in-0:
            consumer:
              configuration:
                key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
                value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
