services:
  postgres:
    image: postgres:18-alpine
    env_file: ./.env
    hostname: postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - payment_gateway_pg:/var/lib/postgresql
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: pg_isready -h 127.0.0.1 -p ${DB_PORT:-5432} -U ${DB_USERNAME} -d ${DB_NAME} || exit 1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  redis:
    image: redis:8-alpine
    hostname: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - payment_gateway_redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    env_file: ./.env
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - payment_gateway_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  # Central authorization PDP (RFC-07). Serves the module's own generated
  # policy set from target/cerbos (produced by `mvn package`). HTTP :3592,
  # gRPC :3593 (the Java SDK talks gRPC).
  cerbos:
    image: ghcr.io/cerbos/cerbos:0.51.0
    command: ["server"]
    hostname: cerbos
    volumes:
      - ./target/cerbos/policies:/policies:ro
    ports:
      - "3592:3592"
      - "3593:3593"
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--kind=grpc"]
      interval: 5s
      timeout: 5s
      retries: 30

  payment-gateway-be:
    image: eclipse-temurin:25-jdk-alpine
    working_dir: /app
    env_file: ./.env
    environment:
      JAR_FILE: payment-gateway-0.0.1-SNAPSHOT.jar
      LABS64_AUTH_AUTHZ_PDPADDRESS: cerbos:3593
      JAVA_TOOL_OPTIONS: >-
        -Duser.timezone=UTC
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "8080:8080"
      - "5005:5005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      cerbos:
        condition: service_healthy
    volumes:
      - ./target:/app/target:ro
    command: ["sh", "-c", "java -jar /app/target/$$JAR_FILE"]
    develop:
      watch:
        - action: restart
          path: ./target/payment-gateway-0.0.1-SNAPSHOT.jar
          target: /app/target/payment-gateway-0.0.1-SNAPSHOT.jar

volumes:
  payment_gateway_pg:
  payment_gateway_redis:
  payment_gateway_rabbitmq:
