# Gateway-less local run (`just run`): no trusted X-Auth-* headers exist, so
# disable the fail-closed auth-context filter and use a fixed dev tenant.
labs64:
  auth-context:
    enabled: true
  tenant:
    default: t_dev

spring:
  # Local PostgreSQL — credentials driven by .env / environment variables
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paymentgateway}
    username: ${DB_USERNAME:paymentgateway}
    password: ${DB_PASSWORD:paymentgateway}

  # Local Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Local RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

  # JPA - show SQL in dev
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true
