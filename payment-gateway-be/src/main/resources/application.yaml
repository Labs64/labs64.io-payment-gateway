server:
    port: 8082
spring:
  profiles:
    active: local
  application:
    name: payment-gateway-be
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_orchestrator
    username: payment
    password: payment
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://issuer.example.com/

payment:
  methods:
    - id: card
      name: Card
      description: Card payments
      provider: stripe
      recurring: true
      currencies: [USD, EUR]
      countries: [US, DE]
    - id: paypal
      name: PayPal
      description: PayPal checkout
      provider: paypal
      recurring: true
      currencies: [USD, EUR]
      countries: [US, DE]
    - id: noop
      name: No-Op
      description: Testing provider
      provider: noop
      recurring: true
      currencies: [USD]
      countries: [US]

messaging:
  payment:
    exchange: payment.exchange
    routing-key: payment.finalized
    queue: payment.finalized.queue

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId}]"
