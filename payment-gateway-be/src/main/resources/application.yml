server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: labs64.io-payment-gateway

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paymentgateway}
    username: ${DB_USERNAME:paymentgateway}
    password: ${DB_PASSWORD:paymentgateway}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: false

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: 10000

  # Spring Cloud Stream
  cloud:
    stream:
      bindings:
        paymentCreated-out-0:
          destination: payment.created
          content-type: application/json
        paymentFinalized-out-0:
          destination: payment.finalized
          content-type: application/json
        paymentClosed-out-0:
          destination: payment.closed
          content-type: application/json
      rabbit:
        bindings:
          paymentCreated-out-0:
            producer:
              routing-key-expression: '''payment.created'''
          paymentFinalized-out-0:
            producer:
              routing-key-expression: '''payment.finalized'''
          paymentClosed-out-0:
            producer:
              routing-key-expression: '''payment.closed'''

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

  # Metrics
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# Payment Gateway Configuration
payment-gateway:
  public-base-url: ${PAYMENT_GATEWAY_PUBLIC_BASE_URL:http://localhost:8080}
  payment-definitions:
    - provider: "stripe"
      enabled: true
      name: "Stripe"
      description: "Credit/Debit Card via Stripe"
      recurring: true
      supported-currencies: ["USD", "EUR", "GBP"]
      supported-countries: ["US", "GB", "DE"]
    - provider: "paypal"
      enabled: true
      name: "PayPal"
      description: "PayPal Checkout"
      recurring: false
      supported-currencies: ["USD", "EUR"]
      supported-countries: ["US", "DE"]
    - provider: "noop"
      enabled: true
      name: "No-Op (Test)"
      description: "Test payment provider - always succeeds"
      recurring: false
      supported-currencies: ["USD", "EUR"]
      supported-countries: ["US", "DE"]
  retry:
    max-retries: 3
    retry-interval-seconds: 60
    backoff-multiplier: 2.0
  redis:
    distributed-lock-ttl-seconds: 30
  idempotency:
    redis-ttl: ${IDEMPOTENCY_REDIS_TTL:PT3H}
    database-ttl: ${IDEMPOTENCY_DATABASE_TTL:P1D}
    processing-timeout: ${IDEMPOTENCY_PROCESSING_TIMEOUT:PT5M}
    cleanup-interval: ${IDEMPOTENCY_CLEANUP_INTERVAL:PT1H}
    cleanup-batch-size: ${IDEMPOTENCY_CLEANUP_BATCH_SIZE:1000}

# Temporary local-development authentication.
# Remove this block and DevAuthFilter when JWT access token validation is implemented.
labs64:
  security:
    dev-auth:
      enabled: ${DEV_AUTH_ENABLED:true}

# Logging Configuration
logging:
  level:
    root: INFO
    io.labs64: DEBUG
    org.springframework.cloud.stream: INFO
    org.springframework.amqp: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-}] [%X{tenantId:-}] - %msg%n"
