name: Trivy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t payment-orchestrator:scan .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: payment-orchestrator:scan
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
