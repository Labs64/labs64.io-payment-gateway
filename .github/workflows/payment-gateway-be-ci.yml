name: Labs64.IO - Payment Gateway Backend - CI

permissions:
  contents: write

on:
  push:
    branches: [ "master" ]
    paths:
      - "payment-gateway-be/**"
      - ".github/workflows/payment-gateway-be-ci.yml"
      - ".github/actions/payment-gateway-deps/**"
      - ".github/compose/**"
  pull_request:
    paths:
      - "payment-gateway-be/**"
      - ".github/workflows/payment-gateway-be-ci.yml"
      - ".github/actions/payment-gateway-deps/**"
      - ".github/compose/**"
  workflow_dispatch:

concurrency:
  group: payment-gateway-be-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: payment-gateway-be

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: paymentgateway
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      REDIS_HOST: localhost
      REDIS_PORT: "6379"

      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

      SPRING_PROFILES_ACTIVE: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Start deps
        uses: ./.github/actions/payment-gateway-deps
        with:
          action: up

      - name: Maven verify
        run: mvn -B verify

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./payment-gateway-be
          push: false
          platforms: linux/amd64,linux/arm64/v8
          tags: payment-gateway:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-gateway-be-test-reports
          path: |
            payment-gateway-be/target/surefire-reports/**
            payment-gateway-be/target/failsafe-reports/**
          if-no-files-found: ignore

      - name: Stop deps
        if: always()
        uses: ./.github/actions/payment-gateway-deps
        with:
          action: down

      - name: Update dependency graph
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: advanced-security/maven-dependency-submission-action@v4
        with:
          directory: payment-gateway-be

  # RFC-05 one-schema gate: the module's domain Cedar policy set must validate
  # against the shared commons schema — drift is a build failure, not a review miss.
  cedar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout commons (shared Cedar schema)
        uses: actions/checkout@v4
        with:
          repository: Labs64/labs64.io-commons
          path: labs64.io-commons
      - name: Cache cedar CLI
        id: cache-cedar
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cedar
          key: cedar-cli-4.11.2
      - name: Install cedar CLI
        run: command -v cedar || cargo install cedar-policy-cli --version 4.11.2 --locked
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Build commons (shared preprocessor + schema)
        run: mvn -q -B -f labs64.io-commons/auth-context-java/pom.xml install -DskipTests
      - name: Generate edge + domain Cedar from OpenAPI
        run: mvn -q -B -f payment-gateway-be/pom.xml generate-sources
      - name: Validate generated edge + domain policies against the shared schema
        run: |
          for f in auth-policy.cedar auth-policy-domain.cedar; do
            echo "validating $f"
            cedar validate \
              --schema labs64.io-commons/auth-policy-cedar/schema.cedarschema \
              --schema-format cedar \
              --policies "payment-gateway-be/target/generated-resources/$f"
          done
